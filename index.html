<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>MATH BATTLE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --blue:#2979ff;--blue-l:#82b1ff;--blue-bg:rgba(41,121,255,0.15);
  --red:#ff1744;--red-l:#ff8a80;--red-bg:rgba(255,23,68,0.15);
  --gold:#ffd600;--green:#00e676;
  --bg:#0a0e1a;--surf:#111827;--surf2:#1c2537;--bdr:rgba(255,255,255,0.09);
  --mono:'Share Tech Mono',monospace;
}
html,body{min-height:100vh;min-height:100dvh;background:var(--bg);color:#e8eaf0;font-family:'Heebo',sans-serif;direction:rtl;overflow-x:hidden;}
#app{max-width:480px;margin:0 auto;padding:12px 14px 60px;}
.screen{display:none;}.screen.active{display:block;}

/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);padding-bottom:10px;margin-bottom:16px;}
.logo{font-size:18px;font-weight:900;letter-spacing:-1px;}
.logo .b{color:var(--blue-l);}.logo .r{color:var(--red-l);}
.pill{font-size:11px;padding:3px 11px;border-radius:20px;font-family:var(--mono);}
.pw{background:rgba(255,214,0,.12);color:var(--gold);border:1px solid rgba(255,214,0,.3);}
.pl{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.3);}
.pe{background:rgba(255,23,68,.12);color:var(--red);border:1px solid rgba(255,23,68,.3);}

/* buttons */
.btn{display:block;width:100%;padding:15px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;border:none;font-family:'Heebo',sans-serif;transition:all .12s;text-align:center;margin-top:10px;-webkit-appearance:none;}
.btn:active{transform:scale(.97);}
.btn-gold{background:var(--gold);color:#000;}
.btn-green{background:var(--green);color:#000;}
.btn-outline{background:transparent;color:rgba(255,255,255,.7);border:1px solid var(--bdr);}
.btn:disabled{opacity:.35;pointer-events:none;}

/* JOIN */
.join-card{background:var(--surf);border:1px solid var(--bdr);border-radius:18px;padding:28px 20px;text-align:center;margin-top:10px;}
.join-card h2{font-size:26px;font-weight:900;margin-bottom:6px;}
.join-card p{color:rgba(255,255,255,.4);font-size:14px;margin-bottom:22px;}
.txt-in{width:100%;padding:14px;border-radius:12px;font-size:17px;background:var(--surf2);border:2px solid var(--bdr);color:#fff;font-family:'Heebo',sans-serif;text-align:center;margin-bottom:14px;outline:none;-webkit-appearance:none;transition:border .2s;}
.txt-in:focus{border-color:var(--gold);}
.team-pick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.t-btn{padding:22px 10px;border-radius:14px;border:2px solid transparent;cursor:pointer;font-family:'Heebo',sans-serif;font-size:16px;font-weight:700;background:var(--surf2);transition:all .15s;-webkit-appearance:none;}
.t-btn.blue{border-color:rgba(41,121,255,.5);color:var(--blue-l);}
.t-btn.red {border-color:rgba(255,23,68,.5);color:var(--red-l);}
.t-btn.blue.sel{background:var(--blue-bg);border-color:var(--blue-l);transform:scale(1.03);}
.t-btn.red.sel {background:var(--red-bg);border-color:var(--red-l);transform:scale(1.03);}
.admin-sep{margin-top:18px;padding-top:18px;border-top:1px solid var(--bdr);text-align:center;}
.admin-sep p{font-size:12px;color:rgba(255,255,255,.3);margin-bottom:8px;}

/* WAITING */
.sb{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.tc{border-radius:14px;padding:14px;text-align:center;border:1px solid transparent;}
.tc.blue{background:var(--blue-bg);border-color:rgba(41,121,255,.3);}
.tc.red {background:var(--red-bg);border-color:rgba(255,23,68,.3);}
.tc-lbl{font-size:10px;font-family:var(--mono);letter-spacing:1px;margin-bottom:8px;}
.tc-lbl.blue{color:var(--blue-l);}.tc-lbl.red{color:var(--red-l);}
.tc-cnt{font-size:36px;font-weight:900;line-height:1;margin-bottom:6px;}
.tc-cnt.blue{color:var(--blue-l);}.tc-cnt.red{color:var(--red-l);}
.tc-names{font-size:11px;color:rgba(255,255,255,.45);line-height:1.7;min-height:22px;}
.panel{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:16px;margin-bottom:12px;}
.p-title{font-size:11px;color:rgba(255,255,255,.35);margin-bottom:10px;letter-spacing:.5px;}
.share-box{background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;padding:9px 12px;font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.45);margin-bottom:10px;word-break:break-all;cursor:pointer;}
.warn{font-size:13px;color:var(--gold);text-align:center;padding:8px;font-weight:700;line-height:1.4;}

/* GAME */
.timer-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.t-num{font-family:var(--mono);font-size:26px;font-weight:700;min-width:52px;}
.prog-tr{flex:1;height:7px;background:rgba(255,255,255,.08);border-radius:4px;}
.prog-fl{height:100%;border-radius:4px;transition:width .9s linear,background .5s;}

/* live score */
.live-score{display:grid;grid-template-columns:1fr 36px 1fr;align-items:center;gap:8px;margin-bottom:16px;}
.ls-t{text-align:center;padding:16px 8px;border-radius:14px;border:1px solid transparent;}
.ls-t.blue{background:var(--blue-bg);border-color:rgba(41,121,255,.25);}
.ls-t.red {background:var(--red-bg);border-color:rgba(255,23,68,.25);}
.ls-lbl{font-size:9px;font-family:var(--mono);letter-spacing:1px;margin-bottom:4px;}
.ls-lbl.blue{color:var(--blue-l);}.ls-lbl.red{color:var(--red-l);}
.ls-pts{font-size:48px;font-weight:900;line-height:1;}
.ls-pts.blue{color:var(--blue-l);}.ls-pts.red{color:var(--red-l);}
.vs-txt{font-size:12px;color:rgba(255,255,255,.25);font-family:var(--mono);text-align:center;}

/* stats */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.s-box{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:10px;text-align:center;}
.s-lbl{font-size:10px;color:rgba(255,255,255,.35);margin-bottom:3px;}
.s-val{font-size:24px;font-weight:700;font-family:var(--mono);}

/* question card */
.q-card{background:var(--surf);border:2px solid var(--bdr);border-radius:18px;padding:24px 18px 20px;text-align:center;}
.q-lbl{font-size:10px;font-family:var(--mono);letter-spacing:1px;color:rgba(255,255,255,.35);margin-bottom:12px;}
.q-txt{font-size:54px;font-weight:900;font-family:var(--mono);line-height:1.1;margin-bottom:24px;}

/* answer choices — big touch targets */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.choice{padding:20px 8px;border-radius:14px;font-size:26px;font-weight:900;font-family:var(--mono);cursor:pointer;border:2px solid var(--bdr);background:var(--surf2);color:#fff;transition:all .12s;-webkit-appearance:none;width:100%;}
.choice:active{transform:scale(.96);}
.choice.correct{background:rgba(0,230,118,.2);border-color:var(--green);color:var(--green);}
.choice.wrong{background:rgba(255,23,68,.15);border-color:var(--red);color:var(--red);}
.choice.reveal{background:rgba(0,230,118,.1);border-color:rgba(0,230,118,.4);color:var(--green);}
.choice:disabled{pointer-events:none;}

/* RESULTS */
.res-wrap{text-align:center;padding:20px 0;}
.win-banner{border-radius:18px;padding:28px 20px;margin-bottom:18px;border:2px solid transparent;}
.win-banner.blue{background:var(--blue-bg);border-color:var(--blue);}
.win-banner.red {background:var(--red-bg);border-color:var(--red);}
.win-banner.tie {background:rgba(255,214,0,.08);border-color:var(--gold);}
.win-emoji{font-size:56px;margin-bottom:10px;}
.win-title{font-size:28px;font-weight:900;margin-bottom:4px;}
.win-sub{font-size:14px;color:rgba(255,255,255,.45);}
.fin-score{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.fs-c{border-radius:14px;padding:20px;text-align:center;}
.fs-c.blue{background:var(--blue-bg);}.fs-c.red{background:var(--red-bg);}
.fs-lbl{font-size:10px;font-family:var(--mono);letter-spacing:1px;margin-bottom:6px;}
.fs-lbl.blue{color:var(--blue-l);}.fs-lbl.red{color:var(--red-l);}
.fs-pts{font-size:52px;font-weight:900;}
.fs-pts.blue{color:var(--blue-l);}.fs-pts.red{color:var(--red-l);}

#loadOv{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:999;}
.spin{width:32px;height:32px;border:3px solid rgba(255,214,0,.2);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loadOv">
  <div class="spin"></div>
  <div style="font-family:var(--mono);font-size:12px;color:rgba(255,255,255,.4);">מתחבר...</div>
</div>

<div id="app" style="display:none;">
  <div class="hdr">
    <div class="logo"><span class="b">MATH</span> <span class="r">BATTLE</span></div>
    <div class="pill pw" id="pill">ממתין</div>
  </div>

  <!-- JOIN -->
  <div class="screen active" id="sJoin">
    <div class="join-card">
      <div style="font-size:48px;margin-bottom:12px;">🧮</div>
      <h2>Math Battle</h2>
      <p>הזן שם ובחר קבוצה</p>
      <input class="txt-in" id="nameIn" placeholder="השם שלך..." maxlength="16" autocomplete="off"/>
      <div class="team-pick">
        <button class="t-btn blue" id="bBlue" onclick="pickTeam('blue')">🔵<br/>כחולה</button>
        <button class="t-btn red"  id="bRed"  onclick="pickTeam('red')">🔴<br/>אדומה</button>
      </div>
      <button class="btn btn-gold" id="joinBtn" onclick="joinGame()" disabled>הצטרף למשחק</button>
      <div class="admin-sep">
        <p>מנהל המשחק?</p>
        <button class="btn btn-outline" onclick="joinAsAdmin()">כניסה כמנהל</button>
      </div>
    </div>
  </div>

  <!-- WAITING -->
  <div class="screen" id="sWait">
    <div class="sb">
      <div class="tc blue">
        <div class="tc-lbl blue">BLUE 🔵</div>
        <div class="tc-cnt blue" id="blueN">0</div>
        <div class="tc-names" id="blueNames"></div>
      </div>
      <div class="tc red">
        <div class="tc-lbl red">RED 🔴</div>
        <div class="tc-cnt red" id="redN">0</div>
        <div class="tc-names" id="redNames"></div>
      </div>
    </div>
    <div class="panel">
      <div class="p-title">שיתוף</div>
      <div class="share-box" id="shareUrl" onclick="copyLink()"></div>
      <div id="balWarn" class="warn" style="display:none;"></div>
      <div id="adminArea"></div>
      <div id="waitMsg" style="font-size:13px;color:rgba(255,255,255,.3);text-align:center;margin-top:10px;"></div>
    </div>
  </div>

  <!-- GAME -->
  <div class="screen" id="sGame">
    <div class="timer-row">
      <div class="t-num" id="tDisp" style="color:var(--gold);">2:00</div>
      <div class="prog-tr"><div class="prog-fl" id="pFill" style="width:100%;background:var(--gold);"></div></div>
    </div>

    <div class="live-score">
      <div class="ls-t blue">
        <div class="ls-lbl blue">BLUE 🔵</div>
        <div class="ls-pts blue" id="bPts">0</div>
      </div>
      <div class="vs-txt">VS</div>
      <div class="ls-t red">
        <div class="ls-lbl red">RED 🔴</div>
        <div class="ls-pts red" id="rPts">0</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="s-box"><div class="s-lbl">✓ נכון</div><div class="s-val" id="mC" style="color:var(--green)">0</div></div>
      <div class="s-box"><div class="s-lbl">✗ טעות</div><div class="s-val" id="mW" style="color:var(--red)">0</div></div>
    </div>

    <div class="q-card" id="qCard">
      <div class="q-lbl">כמה זה?</div>
      <div class="q-txt" id="qTxt">?</div>
      <div class="choices" id="choices"></div>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="sRes">
    <div class="res-wrap">
      <div class="win-banner" id="winBanner">
        <div class="win-emoji" id="winEmoji"></div>
        <div class="win-title" id="winTitle"></div>
        <div class="win-sub"   id="winSub"></div>
      </div>
      <div class="fin-score">
        <div class="fs-c blue"><div class="fs-lbl blue">BLUE 🔵</div><div class="fs-pts blue" id="resBl">0</div></div>
        <div class="fs-c red"> <div class="fs-lbl red">RED 🔴</div> <div class="fs-pts red"  id="resRd">0</div></div>
      </div>
      <div id="adminResArea"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const fb = initializeApp({
  apiKey:"AIzaSyCBYpYUf6f41A1F4FX1YHllLQVCVlH1XzM",
  authDomain:"stock-4d6fd.firebaseapp.com",
  databaseURL:"https://stock-4d6fd-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"stock-4d6fd",
  storageBucket:"stock-4d6fd.firebasestorage.app",
  messagingSenderId:"770000973719",
  appId:"1:770000973719:web:89505dcdfeab8d68549ed2"
});
const db = getDatabase(fb);
const ROOM = "mathbattle2";
const TOTAL = 120;

const rGame    = ()=>ref(db,`${ROOM}/game`);
const rPlayers = ()=>ref(db,`${ROOM}/players`);
const rPlayer  = n=>ref(db,`${ROOM}/players/${n}`);
const rScore   = ()=>ref(db,`${ROOM}/score`);

let myName='', myTeam='', isAdmin=false;
let mC=0, mW=0;
let timerInt=null, pollInt=null, scorePollInt=null;
let curQ=null, answerLocked=false;
let gameSecsLeft=TOTAL;
let gameEnded=false;

/* ── question generator ── */
function genQ(){
  const r=Math.random();
  let a,b,ans,txt;
  if(r<0.45){
    a=Math.floor(Math.random()*9)+2;
    b=Math.floor(Math.random()*9)+2;
    ans=a*b; txt=`${a} × ${b}`;
  } else if(r<0.72){
    a=Math.floor(Math.random()*50)+15;
    b=Math.floor(Math.random()*50)+15;
    ans=a+b; txt=`${a} + ${b}`;
  } else {
    a=Math.floor(Math.random()*60)+20;
    b=Math.floor(Math.random()*Math.min(a-1,40))+1;
    ans=a-b; txt=`${a} - ${b}`;
  }
  /* generate 3 wrong answers — close but distinct */
  const wrongs=new Set();
  while(wrongs.size<3){
    const delta=(Math.floor(Math.random()*8)+1)*(Math.random()<0.5?1:-1);
    const w=ans+delta;
    if(w!==ans && w>0) wrongs.add(w);
  }
  /* shuffle all 4 options */
  const opts=[ans,...wrongs].sort(()=>Math.random()-.5);
  return {txt:`${txt} = ?`, ans, opts};
}

/* ── helpers ── */
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function setPill(t,c){const p=document.getElementById('pill');p.textContent=t;p.className='pill '+c;}
function copyLink(){navigator.clipboard.writeText(location.href).then(()=>{document.getElementById('shareUrl').textContent='✓ הועתק!';setTimeout(()=>document.getElementById('shareUrl').textContent=location.href,1500);});}

/* ── team pick ── */
window.pickTeam=function(t){
  myTeam=t;
  document.getElementById('bBlue').classList.toggle('sel',t==='blue');
  document.getElementById('bRed').classList.toggle('sel',t==='red');
  chkReady();
};
function chkReady(){
  document.getElementById('joinBtn').disabled=!(document.getElementById('nameIn').value.trim()&&myTeam);
}
document.getElementById('nameIn').addEventListener('input',chkReady);

/* ── JOIN ── */
window.joinGame=async function(){
  const n=document.getElementById('nameIn').value.trim();
  if(!n||!myTeam)return;
  myName=n;
  const snap=await get(rGame()); const g=snap.val()||{};
  if(g.phase==='playing'){await regPlayer();startUI();return;}
  if(g.phase==='ended'){goRes();return;}
  await regPlayer(); goWait();
};
window.joinAsAdmin=async function(){
  myName='מנהל'; isAdmin=true; myTeam='blue';
  const snap=await get(rGame()); const g=snap.val()||{};
  if(g.phase==='playing'){startUI();return;}
  if(g.phase==='ended'){goRes();return;}
  goWait();
};
async function regPlayer(){
  const s=await get(rPlayer(myName));
  if(!s.exists()) await set(rPlayer(myName),{team:myTeam,correct:0,wrong:0,joined:Date.now()});
}

/* ── WAITING ── */
function goWait(){
  show('sWait'); setPill('ממתין','pw');
  document.getElementById('shareUrl').textContent=location.href;
  if(isAdmin){
    document.getElementById('adminArea').innerHTML=
      `<button class="btn btn-green" id="stBtn" onclick="startGame()">🚀 התחל משחק</button>
       <button class="btn btn-outline" onclick="resetGame()">🗑 אפס הכל</button>`;
  } else {
    document.getElementById('waitMsg').textContent='ממתין למנהל שיתחיל...';
  }
  onValue(rPlayers(),snap=>{refreshTeams(snap.val()||{});});
  let uiStarted=false;
  onValue(rGame(),snap=>{
    const g=snap.val()||{};
    if(g.phase==='playing'&&!isAdmin&&!uiStarted){uiStarted=true;startUI();}
    if(g.phase==='ended'&&!uiStarted){goRes();}
  });
}

function refreshTeams(p){
  const bl=Object.entries(p).filter(([,v])=>v.team==='blue');
  const rd=Object.entries(p).filter(([,v])=>v.team==='red');
  document.getElementById('blueN').textContent=bl.length;
  document.getElementById('redN').textContent=rd.length;
  document.getElementById('blueNames').textContent=bl.map(([n])=>n).join(', ');
  document.getElementById('redNames').textContent=rd.map(([n])=>n).join(', ');
  const diff=Math.abs(bl.length-rd.length);
  const w=document.getElementById('balWarn');
  const sb=document.getElementById('stBtn');
  if(!bl.length||!rd.length){
    w.style.display='block';w.textContent='⚠ צריך שחקנים בשתי הקבוצות';
    if(sb)sb.disabled=true;
  } else if(diff>1){
    w.style.display='block';w.textContent=`⚠ הפרש ${diff} — מקסימום מותר 1`;
    if(sb)sb.disabled=true;
  } else {
    w.style.display='none';if(sb)sb.disabled=false;
  }
}

/* ── START ── */
window.startGame=async function(){
  await set(rScore(),{blue:0,red:0});
  await set(rGame(),{phase:'playing',secsLeft:TOTAL,startedAt:Date.now()});
  startUI();
};

/* ── GAME UI ── */
let _uiRunning=false;
function startUI(){
  if(_uiRunning)return;
  _uiRunning=true;
  show('sGame'); setPill('משחק פעיל','pl');
  gameEnded=false;

  /* admin drives the global 2-min countdown */
  if(isAdmin){
    timerInt=setInterval(async()=>{
      const s=await get(rGame()); const g=s.val()||{};
      if(g.phase!=='playing'){clearInterval(timerInt);return;}
      const left=(g.secsLeft??TOTAL)-1;
      if(left<=0){
        clearInterval(timerInt);
        await update(rGame(),{phase:'ended',secsLeft:0});
        return;
      }
      await update(rGame(),{secsLeft:left});
    },1000);
  }

  /* poll game state every 2s — completely separate from question logic */
  pollInt=setInterval(async()=>{
    const s=await get(rGame()); const g=s.val()||{};
    gameSecsLeft=g.secsLeft??TOTAL;
    updateTimerUI();
    if(g.phase==='ended'&&!gameEnded){
      gameEnded=true;
      clearInterval(pollInt);
      clearInterval(timerInt);
      clearInterval(scorePollInt);
      goRes();
    }
  },2000);

  /* poll score every 2s */
  scorePollInt=setInterval(async()=>{
    const s=await get(rScore()); const sc=s.val()||{blue:0,red:0};
    document.getElementById('bPts').textContent=sc.blue;
    document.getElementById('rPts').textContent=sc.red;
  },2000);

  nextQ();
}

function updateTimerUI(){
  const m=Math.floor(gameSecsLeft/60),s=gameSecsLeft%60;
  const disp=document.getElementById('tDisp');
  disp.textContent=`${m}:${String(s).padStart(2,'0')}`;
  disp.style.color=gameSecsLeft<=30?'var(--red)':gameSecsLeft<=60?'var(--gold)':'var(--green)';
  const pct=(gameSecsLeft/TOTAL)*100;
  const f=document.getElementById('pFill');
  f.style.width=pct+'%';
  f.style.background=pct>50?'var(--green)':pct>25?'var(--gold)':'var(--red)';
}

/* ── QUESTION — no timer, just 4 buttons ── */
function nextQ(){
  if(gameEnded)return;
  curQ=genQ();
  answerLocked=false;

  document.getElementById('qTxt').textContent=curQ.txt;

  const container=document.getElementById('choices');
  container.innerHTML='';
  curQ.opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.textContent=opt;
    btn.onclick=()=>handleChoice(btn,opt);
    container.appendChild(btn);
  });
}

function handleChoice(btn,val){
  if(answerLocked||gameEnded)return;
  answerLocked=true;

  /* disable all buttons */
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);

  if(val===curQ.ans){
    btn.classList.add('correct');
    mC++;
    document.getElementById('mC').textContent=mC;
    addScore(myTeam,1);
    update(rPlayer(myName),{correct:mC});
  } else {
    btn.classList.add('wrong');
    /* reveal correct answer */
    document.querySelectorAll('.choice').forEach(b=>{
      if(parseInt(b.textContent)===curQ.ans) b.classList.add('reveal');
    });
    mW++;
    document.getElementById('mW').textContent=mW;
    addScore(myTeam,-1);
    update(rPlayer(myName),{wrong:mW});
  }

  /* short pause so player sees result, then next question */
  setTimeout(nextQ, 900);
}

async function addScore(team,delta){
  const s=await get(rScore()); const sc=s.val()||{blue:0,red:0};
  sc[team]=Math.max(0,(sc[team]||0)+delta);
  await set(rScore(),sc);
  document.getElementById(team==='blue'?'bPts':'rPts').textContent=sc[team];
}

/* ── RESULTS ── */
function goRes(){
  clearInterval(timerInt); clearInterval(pollInt); clearInterval(scorePollInt);
  show('sRes'); setPill('נגמר','pe');

  get(rScore()).then(s=>{
    const sc=s.val()||{blue:0,red:0};
    document.getElementById('resBl').textContent=sc.blue;
    document.getElementById('resRd').textContent=sc.red;
    const b=document.getElementById('winBanner');
    const e=document.getElementById('winEmoji');
    const t=document.getElementById('winTitle');
    const u=document.getElementById('winSub');
    if(sc.blue>sc.red){
      b.className='win-banner blue';e.textContent='🔵🏆';
      t.textContent='קבוצה כחולה ניצחה!';u.textContent=`${sc.blue} מול ${sc.red} נקודות`;
    } else if(sc.red>sc.blue){
      b.className='win-banner red';e.textContent='🔴🏆';
      t.textContent='קבוצה אדומה ניצחה!';u.textContent=`${sc.red} מול ${sc.blue} נקודות`;
    } else {
      b.className='win-banner tie';e.textContent='🤝';
      t.textContent='תיקו!';u.textContent=`${sc.blue} נקודות לכל קבוצה`;
    }
  });

  if(isAdmin){
    document.getElementById('adminResArea').innerHTML=
      `<button class="btn btn-gold" onclick="resetGame()">🔄 משחק חדש</button>`;
  }
}

window.resetGame=async function(){  _uiRunning=false;
  if(!confirm('לאפס את המשחק?'))return;
  clearInterval(timerInt); clearInterval(pollInt); clearInterval(scorePollInt);
  await remove(ref(db,ROOM));
  location.reload();
};

/* ── INIT ── */
document.getElementById('loadOv').style.display='none';
document.getElementById('app').style.display='block';
</script>
