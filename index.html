<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poker Tracker Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --casino-gold: #d4af37;
            --gold-gradient: linear-gradient(135deg, #fceabb 0%, #d4af37 50%, #b8860b 100%);
            --deep-black: #0f1215;
            --card-bg: #1c2229;
            --text-silver: #e0e0e0;
            --poker-red: #e63946;
            --poker-green: #4ade80;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Heebo', sans-serif; background-color: var(--deep-black); background-image: radial-gradient(circle at center, #1a2a22 0%, #0f1215 100%); color: var(--text-silver); min-height: 100vh; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid rgba(212,175,55,0.2); margin-bottom: 20px; }
        h1 { font-family: 'Rubik', sans-serif; font-weight: 900; font-size: 2.2rem; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 2px; }
        .admin-toolbar { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-outline-gold { background: transparent; border: 1px solid var(--casino-gold); color: var(--casino-gold); padding: 6px 18px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; }
        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 25px; }
        .stat-box { background: var(--card-bg); border-radius: 15px; padding: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); }
        .stat-box span { font-size: 0.75rem; color: #888; display: block; margin-bottom: 4px; }
        .stat-box strong { font-size: 1.2rem; color: var(--casino-gold); font-family: 'Rubik'; }
        .tabs-nav { display: flex; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: #888; font-weight: 700; cursor: pointer; border-radius: 8px; font-size: 0.9rem; }
        .tab-btn.active { background: var(--gold-gradient); color: #000; }
        .player-card { background: var(--card-bg); border-radius: 18px; padding: 18px; margin-bottom: 15px; border-right: 4px solid var(--casino-gold); position: relative; box-shadow: 0 6px 20px rgba(0,0,0,0.3); overflow: hidden; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 12px; }
        .avatar { width: 65px; height: 65px; border-radius: 50%; background: #000; border: 2px solid var(--casino-gold); display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; cursor: pointer; z-index: 5; }
        .avatar-cards { position: relative; width: 45px; height: 40px; pointer-events: none; }
        .mini-card { position: absolute; width: 28px; height: 42px; background: #fff; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Rubik'; font-weight: 900; box-shadow: 2px 2px 8px rgba(0,0,0,0.6); border: 1px solid #ccc; }
        .card-val { font-size: 13px; line-height: 1; }
        .card-suit { font-size: 12px; line-height: 1; }
        .c1 { transform: rotate(-12deg); left: 0px; z-index: 1; }
        .c2 { transform: rotate(12deg); right: 0px; z-index: 2; top: 2px; }
        .player-name { font-size: 1.2rem; font-weight: 900; color: #fff; }
        .price-display { direction: ltr; display: inline-block; unicode-bidi: isolate; }
        .positive { color: var(--poker-green) !important; }
        .negative { color: var(--poker-red) !important; }
        .game-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(0,0,0,0.25); padding: 10px; border-radius: 12px; margin-bottom: 15px; }
        .info-item label { font-size: 0.65rem; color: #888; display: block; }
        .info-item .value { font-size: 1rem; font-weight: 700; }
        .action-group { display: flex; gap: 8px; position: relative; z-index: 20; }
        .btn-gold { flex: 1; background: var(--gold-gradient); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 0.9rem; }
        .btn-dark { flex: 1; background: #2a3139; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(8px); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card-bg); border: 1px solid var(--casino-gold); padding: 20px; border-radius: 25px; width: 100%; max-width: 450px; text-align: center; max-height: 90vh; overflow-y: auto; }
        .form-input { width: 100%; padding: 14px; background: #0f1215; border: 1px solid #333; color: #fff; border-radius: 12px; margin-bottom: 15px; text-align: center; font-size: 1.1rem; }
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        .section { display: none; }
        .section.active { display: block; }
        .icon-btn { background: transparent; border: none; cursor: pointer; color: #888; padding: 5px; font-size: 1.1rem; vertical-align: middle; }
        .icon-btn:hover { color: var(--casino-gold); }
        #chartContainer { width: 100%; height: 300px; margin-top: 20px; background: rgba(255,255,255,0.02); border-radius: 15px; padding: 10px; }

        /* ── SESSION HISTORY STYLES ── */
        .session-card {
            background: var(--card-bg);
            border-radius: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.06);
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: rgba(0,0,0,0.3);
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .session-date { font-family: 'Rubik', sans-serif; font-weight: 700; font-size: 1rem; color: var(--casino-gold); }
        .session-meta { font-size: 0.75rem; color: #888; margin-top: 2px; }
        .session-pot { font-family: 'Rubik', sans-serif; font-size: 1.3rem; font-weight: 900; }
        .session-body { padding: 14px 16px; display: none; }
        .session-body.open { display: block; }
        .session-player-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .session-player-row:last-child { border-bottom: none; }
        .session-player-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
        .session-player-detail { font-size: 0.75rem; color: #888; line-height: 1.6; }
        .rebuy-tag { display: inline-block; background: rgba(230,57,70,0.15); border: 1px solid rgba(230,57,70,0.3); border-radius: 6px; padding: 1px 7px; font-size: 0.7rem; color: var(--poker-red); margin: 1px; }
        .session-profit { font-family: 'Rubik', sans-serif; font-size: 1.1rem; font-weight: 900; text-align: left; white-space: nowrap; }
        .delete-session-btn { display: block; width: 100%; margin-top: 12px; padding: 8px; background: transparent; border: 1px solid rgba(230,57,70,0.3); color: var(--poker-red); border-radius: 8px; font-size: 0.8rem; cursor: pointer; }
        .session-total-row { display: flex; justify-content: space-between; padding: 10px 0 4px; font-size: 0.8rem; color: #888; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 6px; }
    </style>
</head>
<body id="mainBody">

<!-- ══ מסך כניסה / יצירת קבוצה ══ -->
<div id="lobbyScreen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;">
  <div style="width:100%;max-width:420px;">
    <!-- לוגו -->
    <div style="text-align:center;margin-bottom:36px;">
      <div style="font-size:2.8rem;margin-bottom:8px;">🃏</div>
      <h1 style="font-family:'Rubik',sans-serif;font-weight:900;font-size:2rem;background:var(--gold-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-transform:uppercase;letter-spacing:2px;">Poker Tracker</h1>
      <p style="color:#888;font-size:0.85rem;margin-top:6px;">נהל את קבוצת הפוקר שלך</p>
    </div>

    <!-- כניסה לקבוצה קיימת -->
    <div style="background:var(--card-bg);border-radius:20px;padding:24px;margin-bottom:16px;border:1px solid rgba(212,175,55,0.2);">
      <h3 style="color:var(--casino-gold);margin-bottom:16px;font-size:1rem;">🔑 כניסה לקבוצה קיימת</h3>
      <input type="text" id="joinCode" class="form-input" placeholder="קוד קבוצה (למשל: YAKIR)" style="text-transform:uppercase;letter-spacing:2px;">
      <input type="password" id="joinPass" class="form-input" placeholder="סיסמה (מנהל או משתמש)">
      <button class="btn-gold" style="width:100%;padding:14px;" onclick="window.joinGroup()">כנס לקבוצה ←</button>
    </div>

    <!-- יצירת קבוצה חדשה -->
    <div style="background:var(--card-bg);border-radius:20px;padding:24px;border:1px solid rgba(255,255,255,0.05);">
      <h3 style="color:#aaa;margin-bottom:16px;font-size:1rem;">✨ צור קבוצה חדשה</h3>
      <input type="text" id="newGroupCode" class="form-input" placeholder="קוד קבוצה (אנגלית/מספרים)" style="text-transform:uppercase;letter-spacing:2px;">
      <input type="password" id="newGroupPass" class="form-input" placeholder="סיסמת מנהל">
      <input type="password" id="newGroupViewPass" class="form-input" placeholder="סיסמת צפייה (לחברים)">
      <button class="btn-dark" style="width:100%;padding:14px;background:rgba(212,175,55,0.1);border-color:rgba(212,175,55,0.3);color:var(--casino-gold);" onclick="window.createGroup()">צור קבוצה +</button>
    </div>

    <p id="lobbyError" style="color:var(--poker-red);text-align:center;margin-top:16px;font-size:0.9rem;min-height:20px;"></p>
  </div>
</div>

<!-- ══ מסך האפליקציה הראשי ══ -->
<div id="appScreen" style="display:none;">
    <header>
        <h1>Poker Tracker</h1>
        <div id="groupNameDisplay" style="font-size:0.8rem;color:#888;margin-top:3px;letter-spacing:2px;"></div>
        <div class="admin-toolbar">
            <button class="btn-outline-gold" onclick="window.promptAdmin()">כניסת מנהל 🔒</button>
            <button class="btn-outline-gold admin-only" onclick="window.logoutAdmin()">התנתק 🔓</button>
            <button class="btn-outline-gold" style="font-size:0.75rem;padding:4px 12px;color:#666;border-color:#333;" onclick="window.leaveGroup()">← החלף קבוצה</button>
        </div>
    </header>

    <div class="dashboard">
        <div class="stat-box"><span>ז'יטונים בשולחן</span><strong id="totalPot">₪0</strong></div>
        <div class="stat-box admin-only" style="cursor:pointer;border-color:rgba(74,222,128,0.3);" onclick="window.editPhysicalCash()">
            <span>מזומן פיזי בקופה 💵</span><strong id="physicalCashDisplay" style="color:var(--poker-green);">₪0</strong>
        </div>
        <div class="stat-box"><span>שחקנים פעילים</span><strong id="activeCount">0</strong></div>
        <div class="stat-box"><span>סה"כ ריביי</span><strong id="rebuyCount">0</strong></div>
    </div>

    <nav class="tabs-nav">
        <button id="tabGame" class="tab-btn active" onclick="window.switchTab(this,'gameSection')">שולחן חי</button>
        <button id="tabLeader" class="tab-btn" onclick="window.switchTab(this,'historySection')">Leaderboard</button>
        <button id="tabSessions" class="tab-btn" onclick="window.switchTab(this,'sessionsSection')">ערבים 📅</button>
    </nav>

    <div id="gameSection" class="section active">
        <div class="admin-only" style="background:var(--card-bg);padding:15px;border-radius:15px;margin-bottom:20px;border:1px solid rgba(212,175,55,0.2);">
            <div style="display:flex;gap:8px;">
                <input type="text" id="newPlayerName" class="form-input" placeholder="שם" style="margin-bottom:0">
                <input type="text" id="newPlayerCards" class="form-input" placeholder="AhKs" style="width:100px;margin-bottom:0">
                <button class="btn-gold" style="flex:none;width:60px;padding:0" onclick="window.addNewPlayer()">+</button>
            </div>
        </div>
        <div id="activeList"></div>
        <div id="waitingArea" class="admin-only" style="margin-top:30px;">
            <h4 style="margin-bottom:10px;color:var(--casino-gold);font-size:0.9rem;">שחקנים קבועים:</h4>
            <div id="waitingList"></div>
        </div>
    </div>

    <div id="historySection" class="section">
        <div id="leaderboardList"></div>
    </div>

    <div id="sessionsSection" class="section">
        <div id="sessionsList"></div>
    </div>
</div>

<!-- Modals -->
<div id="rebuyModal" class="modal">
    <div class="modal-content">
        <h3>REBUY ל-<span id="rbName"></span></h3>
        <p style="color:#888;font-size:0.85rem;margin-bottom:15px;" id="rbTime"></p>

            <button class="btn-gold" onclick="window.confirmRebuy(50)">₪50</button>

        <button class="btn-dark" style="width:100%;margin-top:20px;" onclick="window.closeModal()">ביטול</button>

</div>

<div id="cashoutModal" class="modal">
    <div class="modal-content">
        <h3>CASHOUT ל-<span id="coName"></span></h3>
        <input type="number" id="coAmount" class="form-input" placeholder="כמה ₪ קופה יש לו?" oninput="window.updateLiveCalculation()">
        <div id="coCalcResult" style="margin-bottom:15px;font-weight:900;font-size:1.2rem;"></div>
        <div id="cashInputArea" style="display:none;background:rgba(255,255,255,0.05);padding:15px;border-radius:12px;margin-bottom:15px;">
            <label id="cashLabel" style="display:block;font-size:0.85rem;color:#aaa;margin-bottom:8px;"></label>
            <input type="number" id="coCash" class="form-input" placeholder="סכום מזומן (₪)" style="margin-bottom:0;" oninput="window.updateCashCalculation()">
            <div id="coCashResult" style="margin-top:10px;font-weight:700;font-size:1.05rem;"></div>
        </div>
        <button class="btn-gold" style="width:100%;" onclick="window.confirmCashout()">אשר פדיון</button>
        <button class="btn-dark" style="width:100%;margin-top:10px;" onclick="window.closeModal()">ביטול</button>
    </div>
</div>

<div id="chartModal" class="modal">
    <div class="modal-content" style="max-width:95vw;">
        <h3 id="chartPlayerName" style="color:var(--casino-gold);">גרף ביצועים</h3>
        <div id="chartContainer"><canvas id="playerChart"></canvas></div>
        <button class="btn-dark" style="width:100%;margin-top:20px;" onclick="window.closeModal()">סגור</button>
    </div>
</div>

<div id="historyEditModal" class="modal">
    <div class="modal-content" style="max-width:95vw;">
        <h3 id="historyEditName" style="color:var(--casino-gold);">עריכת היסטוריה</h3>
        <div id="historyEditList" style="text-align:right;margin-top:15px;"></div>
        <button class="btn-dark" style="width:100%;margin-top:20px;" onclick="window.closeModal()">סגור</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyB2TjONw7Kb3WY65qQZjZ5w6fZjkhVl2_g",
    authDomain: "poker-tracker-23c60.firebaseapp.com",
    databaseURL: "https://poker-tracker-23c60-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "poker-tracker-23c60",
    storageBucket: "poker-tracker-23c60.firebasestorage.app",
    messagingSenderId: "119167346985",
    appId: "1:119167346985:web:17f5323778ea3a25832f38"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── מצב קבוצה ──
let currentGroupCode = null;   // קוד הקבוצה הפעיל
let groupAdminPass = null;     // סיסמת המנהל
let groupViewPass  = null;     // סיסמת הצפייה
let dbRef = null;              // ה-ref הפעיל
let currentListener = null;   // ה-onValue listener הפעיל

window.players = [];
window.physicalCash = 0;
let currentId = null;
let myChart = null;
const SESSION_GAP_MS = 12 * 60 * 60 * 1000;

// ══════════════════════════════════════════
// לוגיקת קבוצות
// ══════════════════════════════════════════

// קבוצת יקיר הקיימת ממופה ל-poker_v2 לשמירת נתונים
function getDbPath(code) {
    if (code.toUpperCase() === 'YAKIR') return 'poker_v2';
    return 'groups/' + code.toUpperCase();
}

window.joinGroup = async () => {
    const code = document.getElementById('joinCode').value.trim().toUpperCase();
    const pass = document.getElementById('joinPass').value.trim();
    if (!code) { showLobbyError('נא להזין קוד קבוצה'); return; }
    if (!pass) { showLobbyError('נא להזין סיסמה'); return; }
    showLobbyError('בודק...');
    try {
        const snap = await get(ref(db, getDbPath(code)));
        if (!snap.exists()) { showLobbyError('קבוצה לא נמצאה. בדוק את הקוד.'); return; }
        const data = snap.val();
        const adminPass = String(data.adminPassword ?? (code === 'YAKIR' ? '1946' : ''));
        const viewPass  = String(data.viewPassword  ?? (code === 'YAKIR' ? '1946' : ''));
        if (pass === adminPass) {
            enterApp(code, adminPass, viewPass, true);   // מנהל
        } else if (viewPass && pass === viewPass) {
            enterApp(code, adminPass, viewPass, false);  // צפייה בלבד
        } else {
            showLobbyError('סיסמה שגויה');
        }
    } catch(e) { showLobbyError('שגיאת חיבור. נסה שוב.'); }
};

window.createGroup = async () => {
    const code = document.getElementById('newGroupCode').value.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
    const pass = document.getElementById('newGroupPass').value.trim();
    const viewPass = document.getElementById('newGroupViewPass').value.trim();
    if (!code || code.length < 2) { showLobbyError('קוד חייב להכיל לפחות 2 תווים באנגלית'); return; }
    if (!pass || pass.length < 3) { showLobbyError('סיסמת מנהל חייבת להכיל לפחות 3 תווים'); return; }
    if (!viewPass || viewPass.length < 3) { showLobbyError('סיסמת צפייה חייבת להכיל לפחות 3 תווים'); return; }
    if (pass === viewPass) { showLobbyError('סיסמת מנהל וסיסמת צפייה חייבות להיות שונות'); return; }
    if (code === 'YAKIR') { showLobbyError('קוד זה שמור'); return; }
    showLobbyError('יוצר קבוצה...');
    try {
        const path = getDbPath(code);
        const snap = await get(ref(db, path));
        if (snap.exists()) { showLobbyError('קוד זה תפוס, בחר קוד אחר'); return; }
        await set(ref(db, path), { adminPassword: pass, viewPassword: viewPass, players: [], physicalCash: 0 });
        enterApp(code, pass, viewPass, true);
    } catch(e) { showLobbyError('שגיאת חיבור. נסה שוב.'); }
};

// isAdmin = האם הנכנס הוא מנהל
function enterApp(code, adminPass, viewPass, isAdmin) {
    currentGroupCode = code;
    groupAdminPass = adminPass;
    groupViewPass  = viewPass;

    // שמירה ב-sessionStorage — שמירת סוג הכניסה
    sessionStorage.setItem('pokerGroup', code);
    sessionStorage.setItem('pokerPass', isAdmin ? adminPass : viewPass);

    // הפעלת ה-listener
    if (currentListener && dbRef) off(dbRef);
    dbRef = ref(db, getDbPath(code));
    currentListener = onValue(dbRef, (snap) => {
        const data = snap.val() || {};
        window.players = data.players || [];
        window.physicalCash = data.physicalCash || 0;
        groupAdminPass = data.adminPassword || (currentGroupCode === 'YAKIR' ? '1946' : groupAdminPass);
        groupViewPass  = data.viewPassword  || (currentGroupCode === 'YAKIR' ? '1946' : groupViewPass);
        render();
        if (!window._scaleHandled) handleBatchFromUrl();
    });

    // עדכון UI
    document.getElementById('lobbyScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    document.getElementById('groupNameDisplay').innerText = '📍 ' + code + (isAdmin ? ' · מנהל 👑' : ' · צופה 👁️');
    document.getElementById('mainBody').classList.remove('is-admin');
    if (isAdmin) document.getElementById('mainBody').classList.add('is-admin');
}

window.leaveGroup = () => {
    if (!confirm('לצאת מהקבוצה ולחזור למסך הבחירה?')) return;
    if (currentListener && dbRef) off(dbRef);
    currentGroupCode = null;
    sessionStorage.removeItem('pokerGroup');
    sessionStorage.removeItem('pokerPass');
    document.getElementById('mainBody').classList.remove('is-admin');
    document.getElementById('appScreen').style.display = 'none';
    document.getElementById('lobbyScreen').style.display = 'flex';
    document.getElementById('joinCode').value = '';

// ── Card Parser ──
const parseCard = (str) => {
    const suits = { 'h': '♥️', 'd': '♦️', 's': '♠️', 'c': '♣️' };
    const match = str.match(/([2-9TJQKA]|10)([hdscl])?/i);
    if (!match) return { val: "?", suit: "", color: "#333" };
    const val = match[1].toUpperCase();
    const suitKey = (match[2] || 's').toLowerCase();
    const isRed = suitKey === 'h' || suitKey === 'd';
    return { val, suit: suits[suitKey] || '♠️', color: isRed ? '#e63946' : '#1a1a1a' };
};
const getAvatarHtml = (cardsStr) => {
    const cards = (cardsStr || "??").match(/([2-9TJQKA]|10)([hdscl])?/gi) || ["?", "?"];
    const c1 = parseCard(cards[0] || "?");
    const c2 = parseCard(cards[1] || cards[0] || "?");
    return `<div class="avatar-cards"><div class="mini-card c1" style="color:${c1.color}"><span class="card-val">${c1.val}</span><span class="card-suit">${c1.suit}</span></div><div class="mini-card c2" style="color:${c2.color}"><span class="card-val">${c2.val}</span><span class="card-suit">${c2.suit}</span></div></div>`;
};

// ── Session grouping ──
// בונה מערך ערבים מתוך history של השחקנים
function buildSessions(players) {
    // אוסף את כל הcashout events מכל השחקנים
    const events = [];
    for (const p of players) {
        if (!p.history) continue;
        for (const h of p.history) {
            events.push({ ...h, playerName: p.name, playerId: p.id });
        }
    }
    // ממיין לפי זמן
    events.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
    if (events.length === 0) return [];

    // מקבץ לערבים לפי gap של 12 שעות
    const sessions = [];
    let current = { events: [events[0]], startTs: events[0].timestamp || 0 };
    for (let i = 1; i < events.length; i++) {
        const prev = events[i - 1].timestamp || 0;
        const cur  = events[i].timestamp || 0;
        if (cur - prev > SESSION_GAP_MS) {
            sessions.push(current);
            current = { events: [events[i]], startTs: cur };
        } else {
            current.events.push(events[i]);
        }
    }
    sessions.push(current);

    // לכל ערב בונה סיכום לפי שחקן
    return sessions.map((sess, idx) => {
        const byPlayer = {};
        for (const e of sess.events) {
            if (!byPlayer[e.playerName]) byPlayer[e.playerName] = { name: e.playerName, id: e.playerId, invested: 0, cashedOut: 0, profit: 0, cashouts: [] };
            byPlayer[e.playerName].invested  += (e.invested || 0);
            byPlayer[e.playerName].cashedOut += (e.cashedOut || 0);
            byPlayer[e.playerName].profit    += (e.profit || 0);
            byPlayer[e.playerName].cashouts.push({ profit: e.profit, invested: e.invested, cashedOut: e.cashedOut, timestamp: e.timestamp, rebuys: e.rebuys || 0, rebuyLog: e.rebuyLog || [] });
        }
        const players = Object.values(byPlayer);
        const totalPot = players.reduce((s, p) => s + p.invested, 0);
        const lastTs = Math.max(...sess.events.map(e => e.timestamp || 0));
        return { id: `sess_${idx}`, startTs: sess.startTs, lastTs, players, totalPot, eventCount: sess.events.length };
    }).reverse(); // הכי חדש ראשון
}

window.confirmCashout = async () => {

    const cashHandled = parseInt(document.getElementById('coCash').value) || 0;
    const p = window.players.find(x => x.id === currentId);
    if (!p) return;

    const profit = amt - p.currentInv;
    p.lifetime = (p.lifetime || 0) + profit;

    let digitalProfit = profit;
    if (profit < 0) { digitalProfit += cashHandled; window.physicalCash += cashHandled; }
    else if (profit > 0) { digitalProfit -= cashHandled; window.physicalCash -= cashHandled; }
    p.sessionBalance = (p.sessionBalance || 0) + digitalProfit;

    if (!p.history) p.history = [];
    p.history.push({
        date: new Date().toLocaleDateString('he-IL', {day:'2-digit', month:'2-digit'}),
        profit,
        invested: p.currentInv,
        cashedOut: amt,
        timestamp: Date.now(),
        rebuys: p.rebuys,
        rebuyLog: p.rebuyLog || []
    });

    p.active = false;
    p.currentInv = 0;
    p.rebuys = 0;
    p.rebuyLog = [];

    await save();
    window.closeModal();
};

// ── מחיקת ערב ──
window.deleteSession = async (sessionIdx, playerNames) => {
    if (!confirm(`למחוק ערב זה? כל הנתונים של ${playerNames.join(', ')} מאותו ערב יימחקו מה-Leaderboard והגרפים.`)) return;

    // בונים מחדש את הסשנים כדי לדעת אילו timestamps למחוק
    const sessions = buildSessions(window.players);
    const sess = sessions[sessionIdx];
    if (!sess) return;

    const tsSet = new Set(sess.players.flatMap(sp => sp.cashouts.map(c => c.timestamp)));

    // מוחקים את הרשומות האלו מה-history של כל שחקן
    for (const p of window.players) {
        if (!p.history) continue;
        const before = p.history.length;
        p.history = p.history.filter(h => !tsSet.has(h.timestamp));
        // מעדכנים lifetime
        const removed = p.history.length < before;
        if (removed) {
            // מחשבים מחדש lifetime מה-history שנשאר
            p.lifetime = p.history.reduce((s, h) => s + (h.profit || 0), 0);
        }
    }
    await save();
};

    const total = entries.reduce((s,e) => s+e.amount, 0);
    overlay.innerHTML = `<div style="background:#1c2229;border:1px solid #d4af37;border-radius:20px;padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;">
        <div style="font-family:'Rubik',sans-serif;font-size:1.1rem;font-weight:900;color:#d4af37;text-align:center;margin-bottom:16px;">⚖️ תוצאות השקילה</div>
        ${rows}
        <div style="text-align:center;margin:16px 0 4px;font-size:0.75rem;color:#888;">סה"כ</div>
        <div style="text-align:center;font-family:'Rubik',sans-serif;font-size:2rem;font-weight:900;color:#fff;margin-bottom:20px;">₪${total}</div>
        <button id="scaleApplyBtn" style="width:100%;padding:14px;background:linear-gradient(135deg,#fceabb,#d4af37);color:#000;border:none;border-radius:12px;font-weight:900;font-size:1rem;cursor:pointer;margin-bottom:10px;">✓ אשר Cashout לכולם</button>
        <button id="scaleCancelBtn" style="width:100%;padding:12px;background:transparent;color:#888;border:1px solid #333;border-radius:12px;font-weight:700;cursor:pointer;">✕ סגור</button>
    </div>`;
    document.body.appendChild(overlay);
    document.getElementById('scaleCancelBtn').addEventListener('click', () => overlay.remove());
    document.getElementById('scaleApplyBtn').addEventListener('click', async () => {
        document.getElementById('scaleApplyBtn').disabled = true;
        document.getElementById('scaleApplyBtn').innerText = '...שומר';
        for (const e of entries) {
            const match = window.players.find(p => p.active && p.name.trim() === e.name.trim()) || window.players.find(p => p.active && p.name.toLowerCase().includes(e.name.toLowerCase()));
            if (match) {
                const savedInv = match.currentInv;
                const profit = e.amount - savedInv;
                match.lifetime = (match.lifetime||0) + profit;
                match.sessionBalance = (match.sessionBalance||0) + profit;
                if (!match.history) match.history = [];
                match.history.push({ date: new Date().toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'}), profit, invested: savedInv, cashedOut: e.amount, timestamp: Date.now(), rebuys: match.rebuys || 0, rebuyLog: match.rebuyLog || [] });
                match.active = false; match.currentInv = 0; match.rebuys = 0; match.rebuyLog = [];
            }
        }
        await save();
        overlay.remove();
        render();
        window.switchTab(document.getElementById('tabSessions'), 'sessionsSection');
    });
}

// ── Render ──
function render() {
    const isAdmin = document.getElementById('mainBody').classList.contains('is-admin');
    const active = window.players.filter(p => p.active);
    const waiting = window.players.filter(p => !p.active);

    // Active list
    document.getElementById('activeList').innerHTML = active.map(p => `
        <div class="player-card">
            <div class="card-header">
                <div style="display:flex;align-items:center;gap:12px;">
                    <div class="avatar" onclick="window.editPlayerCards(${p.id})">${getAvatarHtml(p.cards||"??")}</div>
                    <div class="player-name">${p.name}</div>
                </div>
                <span class="price-display ${p.lifetime>=0?'positive':'negative'}">₪${p.lifetime}</span>
            </div>
            <div class="game-info">
                <div class="info-item"><label>הושקע (נוכחי)</label><span class="value price-display">₪${p.currentInv}</span></div>
                <div class="info-item"><label>ריביי ×${p.rebuys||0}</label><span class="value price-display ${((p.sessionBalance||0)-p.currentInv)>=0?'positive':'negative'}">₪${(p.sessionBalance||0)-p.currentInv}</span></div>
            </div>
            ${isAdmin ? `<div class="action-group"><button class="btn-gold" onclick="window.openRebuy(${p.id},'${p.name}')">+ Rebuy</button><button class="btn-dark" onclick="window.openCashout(${p.id},'${p.name}')">Cashout</button></div>` : ''}
        </div>`).join('');

    // Waiting list
    document.getElementById('waitingList').innerHTML = waiting.map(p => `
        <div style="display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.03);padding:8px 12px;border-radius:12px;margin-bottom:8px;">
            <div style="display:flex;align-items:center;gap:10px;">
                <div class="avatar" style="width:35px;height:35px;transform:scale(0.6)">${getAvatarHtml(p.cards||"??")}</div>
                <span style="font-size:0.9rem;">${p.name}</span>
            </div>
            <div style="display:flex;gap:5px;">
                <button class="btn-outline-gold" style="padding:2px 10px" onclick="window.joinGame(${p.id})">הכנס</button>
                <button class="icon-btn" onclick="window.deletePlayer(${p.id})">🗑️</button>
            </div>
        </div>`).join('');

    // Leaderboard
    const sorted = [...window.players].sort((a,b) => b.lifetime - a.lifetime);
    const visible = sorted;
    document.getElementById('leaderboardList').innerHTML = visible.map((p, i) => `
        <div class="player-card" style="padding:15px;margin-bottom:8px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div style="display:flex;align-items:center;gap:10px;">
                    <span style="color:var(--casino-gold);font-weight:900;">#${i+1}</span>
                    <div class="avatar" style="width:35px;height:35px;transform:scale(0.6)">${getAvatarHtml(p.cards||"??")}</div>
                    <span style="font-weight:700;">${p.name}</span>
                    <button class="icon-btn" onclick="window.openPlayerChart(${p.id})">📈</button>
                    ${isAdmin ? `<button class="icon-btn" onclick="window.openHistoryEditor(${p.id})">📝</button>` : ''}
                    ${isAdmin ? `<button class="icon-btn" onclick="window.editLifetime(${p.id})">✏️</button>` : ''}
                </div>
                <span class="price-display ${p.lifetime>=0?'positive':'negative'}" style="font-weight:900;">₪${p.lifetime}</span>
            </div>
        </div>`).join('');

    // Sessions
    renderSessions(isAdmin);

    // Stats
    document.getElementById('totalPot').innerText = `₪${active.reduce((s,p)=>s+p.currentInv,0)}`;
    document.getElementById('activeCount').innerText = active.length;
    document.getElementById('rebuyCount').innerText = active.reduce((s,p)=>s+(p.rebuys||0),0);
    document.getElementById('physicalCashDisplay').innerText = `₪${window.physicalCash}`;
}

function renderSessions(isAdmin) {
    const sessions = buildSessions(window.players);
    if (sessions.length === 0) {
        document.getElementById('sessionsList').innerHTML = '<div style="text-align:center;padding:40px;color:#888;">אין ערבים בהיסטוריה עדיין 🃏</div>';
        return;
    }
    document.getElementById('sessionsList').innerHTML = sessions.map((sess, idx) => {
        const dateStr = formatDate(sess.startTs);
        const timeStr = formatTime(sess.startTs) + ' — ' + formatTime(sess.lastTs);
        const totalPot = sess.players.reduce((s,p) => s + p.invested, 0);
        const totalProfit = sess.players.reduce((s,p) => s + p.profit, 0); // אמור להיות 0 תמיד

        const playersHtml = sess.players.map(sp => {
            const profitCls = sp.profit >= 0 ? 'positive' : 'negative';
            // rebuy log מהcashout
            const rebuyLogs = sp.cashouts.flatMap(c => c.rebuyLog || []);
            const rebuyCount = sp.cashouts.reduce((s,c) => s + (c.rebuys || 0), 0);
            // אם יש rebuyLog מפורט — מציג עם שעות. אחרת רק כמות
            let rebuyHtml = '';
            if (rebuyLogs.length > 0) {
                rebuyHtml = rebuyLogs.map(r => `<span class="rebuy-tag">+₪${r.amount}${r.timestamp ? ' ' + formatTime(r.timestamp) : ''}</span>`).join(' ');
            } else if (rebuyCount > 0) {
                rebuyHtml = `<span class="rebuy-tag">×${rebuyCount} ריביי</span>`;
            }

            return `<div class="session-player-row">
                <div>
                    <div class="session-player-name">${sp.name}</div>
                    <div class="session-player-detail">
                        השקיע: ₪${sp.invested} | פדה: ₪${sp.cashedOut}<br>
                        ${rebuyHtml || 'ללא ריביי'}
                    </div>
                </div>
                <div class="session-profit ${profitCls}">
                    ${sp.profit >= 0 ? '+' : ''}₪${sp.profit}
                </div>
            </div>`;
        }).join('');

        const deleteBtn = isAdmin ? `<button class="delete-session-btn" onclick="window.deleteSession(${idx},[${sess.players.map(p=>`'${p.name}'`).join(',')}])">🗑️ מחק ערב זה</button>` : '';

        return `<div class="session-card">
            <div class="session-header" onclick="this.nextElementSibling.classList.toggle('open')">
                <div>
                    <div class="session-date">📅 ${dateStr}</div>
                    <div class="session-meta">${timeStr} · ${sess.players.length} שחקנים</div>
                </div>
                <div class="session-pot" style="color:var(--casino-gold);">₪${totalPot}</div>
            </div>
            <div class="session-body">
                ${playersHtml}
                <div class="session-total-row">
                    <span>סה"כ קופה באותו ערב</span>
                    <span style="color:var(--casino-gold);font-weight:700;">₪${totalPot}</span>
                </div>
                ${deleteBtn}
            </div>
        </div>`;
    }).join('');
}
</script>
